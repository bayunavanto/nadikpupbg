<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      NADI - Navigasi Administrasi Digital Internal KPU Kab. Purbalingga
    </title>

    <link rel="icon" href="assets/img/nadiv2.png" type="image/png" />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/simple-line-icons/2.4.1/css/simple-line-icons.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    />

    <link rel="stylesheet" href="./assets/css/auth.css" />
  </head>

  <body>
    <div class="registration-form">
      <form id="frm" autocomplete="off">
        <div class="auth-header">
          <div class="logo-wrap">
            <img
              src="assets/img/nadiv2.png"
              alt="Logo NADI"
              style="height: 150px; width: auto"
            />
          </div>

          <!-- <div class="auth-badge">NADI</div> -->

          <h1 class="auth-title">Selamat Datang</h1>

          <p class="auth-subtitle">
            Masuk untuk mengakses layanan administrasi digital internal KPU
            Kabupaten Purbalingga.
          </p>
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="form-group">
          <label for="username" class="input-label">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Masukkan username"
            class="form-control item"
          />
        </div>

        <div class="form-group">
          <label for="password" class="input-label">Password</label>

          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              placeholder="Masukkan password"
              class="form-control item"
            />

            <span class="toggle-password" onclick="togglePassword()">
              <svg
                id="eyeIcon"
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </div>
        </div>

        <div class="form-group">
          <button
            type="button"
            id="btnLogin"
            onclick="login()"
            class="btn btn-block create-account"
          >
            Login
          </button>
        </div>
      </form>

      <div class="social-media">
        <div>
          <small>
            Dev by
            <a href="https://vantolab.biz.id" target="_blank">Vanss</a>
          </small>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      let isPasswordVisible = false;

      function togglePassword() {
        const input = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");

        isPasswordVisible = !isPasswordVisible;

        if (isPasswordVisible) {
          input.type = "text";

          icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
        <path d="M1 1l22 22"></path>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
      `;
        } else {
          input.type = "password";

          icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      `;
        }
      }
    </script>

    <script type="module">
      import { auth, db } from "./assets/js/firebase.js";
      import {
        signInWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      import {
        collection,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const errorMsg = document.getElementById("errorMsg");
      const btn = document.getElementById("btnLogin");

      // ================= LOGIN =================
      window.login = async function () {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        errorMsg.innerText = "";

        if (!username || !password) {
          errorMsg.innerText = "Semua field wajib diisi!";
          return;
        }

        const email = username + "@nadikpupbg.local";

        // 🔒 DISABLE BUTTON
        btn.disabled = true;
        btn.innerText = "Sedang login...";

        try {
          // 🔐 Login ke Firebase Auth
          await signInWithEmailAndPassword(auth, email, password);

          // ❗ jangan redirect di sini
          // biarkan onAuthStateChanged yang handle
        } catch (error) {
          console.log("LOGIN ERROR:", error.code, error.message);

          if (error.code === "auth/invalid-credential") {
            errorMsg.innerText = "Username atau password salah";
          } else if (error.code === "auth/user-not-found") {
            errorMsg.innerText = "User tidak ditemukan";
          } else if (error.code === "auth/wrong-password") {
            errorMsg.innerText = "Password salah";
          } else {
            errorMsg.innerText = "Terjadi kesalahan saat login";
          }

          // 🔓 ENABLE KEMBALI
          btn.disabled = false;
          btn.innerText = "Login";
        }
      };

      // ================= AUTH CHECK =================
      onAuthStateChanged(auth, async (user) => {
        if (!user) return;

        try {
          const username = user.email.split("@")[0];

          const q = query(
            collection(db, "users"),
            where("username", "==", username),
          );

          const snapshot = await getDocs(q);

          if (snapshot.empty) {
            await signOut(auth);
            Swal.fire("Error", "Data user tidak ditemukan", "error");

            // 🔓 ENABLE KEMBALI
            btn.disabled = false;
            btn.innerText = "Login";
            return;
          }

          const userData = snapshot.docs[0].data();

          // 🚫 cek status aktif
          if (userData.aktif !== true) {
            await signOut(auth);
            Swal.fire("Akses Ditolak", "User tidak aktif", "error");

            // 🔓 ENABLE KEMBALI
            btn.disabled = false;
            btn.innerText = "Login";
            return;
          }

          // ✅ lolos semua → masuk dashboard
          window.location.replace("dashboard.html");
        } catch (err) {
          console.error("AUTH CHECK ERROR:", err);
          await signOut(auth);
          Swal.fire("Error", "Terjadi kesalahan sistem", "error");

          // 🔓 ENABLE KEMBALI
          btn.disabled = false;
          btn.innerText = "Login";
        }
      });
    </script>
  </body>
</html>
