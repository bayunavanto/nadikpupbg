<!doctype html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profil - NADI</title>

    <link
      rel="shortcut icon"
      href="assets/img/nadiv2.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/css/interface.css" />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css"
    />
  </head>

  <body>
    <!-- HEADER (SAMA PERSIS DENGAN DASHBOARD) -->
    <header>
      <div class="logo">
        <img
          src="assets/img/nadiv2.png"
          width="85"
          style="display: block; margin: 2 auto 20px"
        />
        <span>
          NADI - Navigasi Administrasi Digital Internal <br />
          KPU Kab. Purbalingga
        </span>
      </div>

      <div class="clock" id="clock">--:--:--</div>
    </header>

    <!-- MAIN -->
    <main class="container">
      <div class="page-title">
        <h2>⬇️ Download Absensi</h2>
        <p>Download data absensi berdasarkan rentang tanggal</p>
      </div>

      <div class="form-card">
        <div class="form-group">
          <label>Tanggal Mulai</label>
          <input type="date" id="startDate" />
        </div>
        <div class="form-group">
          <label>Tanggal Akhir</label>
          <input type="date" id="endDate" />
        </div>

        <div class="form-group">
          <!-- <label>Pilih Pegawai (Opsional)</label> -->
          <select id="username" class="custom-select" style="display: none">
            <option value="">-- Semua Pegawai --</option>
          </select>
        </div>

        <button id="btnDownload" class="btn-primary">⬇️ Download CSV</button>

        <button
          class="btn-secondary"
          onclick="window.location.href = 'admin.html'"
        >
          ← Kembali
        </button>
      </div>
    </main>

    <footer>
      © <span id="year"></span> NADI - Navigasi Administrasi Digital Internal
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="./assets/js/clock.js"></script>

    <!-- nanti script profil kita taruh di sini -->
    <script type="module" src="./assets/js/auth-guard.js"></script>
    <script type="module" src="./assets/js/download-absen.js"></script>
    <script type="module">
      import "./assets/js/admin-protect.js";
    </script>
  </body>
</html>
