<!doctype html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profil - NADI</title>

    <link
      rel="shortcut icon"
      href="assets/img/nadiv2.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/css/interface.css" />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css"
    />
  </head>

  <body>
    <!-- HEADER (SAMA PERSIS DENGAN DASHBOARD) -->
    <header>
      <div class="logo">
        <img
          src="assets/img/nadiv2.png"
          width="85"
          style="display: block; margin: 2 auto 20px"
        />
        <span>
          NADI - Navigasi Administrasi Digital Internal <br />
          KPU Kab. Purbalingga
        </span>
      </div>

      <div class="clock" id="clock">--:--:--</div>
    </header>

    <!-- MAIN -->
    <main class="container">
      <div class="page-title">
        <h2>🔐 Ubah Password</h2>
        <p>Harap hati-hati dalam merubah password</p>
      </div>

      <div class="form-card">
        <div class="form-group">
          <label>Password Lama</label>
          <input type="password" id="oldPassword" placeholder="••••••••" />
        </div>

        <div class="form-group">
          <label>Password Baru</label>
          <input type="password" id="newPassword" placeholder="••••••••" />
        </div>

        <div class="form-group">
          <label>Konfirmasi Password Baru</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" />
        </div>

        <button id="btnChangePass" class="btn-primary">🔐 Ubah Password</button>
        <button
          class="btn-secondary"
          onclick="window.location.href = 'profile.html'"
        >
          ← Kembali
        </button>
      </div>
    </main>

    <footer>
      © <span id="year"></span> NADI - Navigasi Administrasi Digital Internal
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="./assets/js/clock.js"></script>

    <!-- nanti script profil kita taruh di sini -->
    <script type="module" src="./assets/js/auth-guard.js"></script>
    <script type="module">
      import { auth } from "./assets/js/firebase.js";

      import {
        EmailAuthProvider,
        reauthenticateWithCredential,
        updatePassword,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const btn = document.getElementById("btnChangePass");

      btn.addEventListener("click", async () => {
        const oldPassword = document.getElementById("oldPassword").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (!oldPassword || !newPassword || !confirmPassword) {
          Swal.fire("Oops", "Semua field wajib diisi", "warning");
          return;
        }

        if (newPassword !== confirmPassword) {
          Swal.fire("Oops", "Konfirmasi password tidak sama", "warning");
          return;
        }

        if (newPassword.length < 6) {
          Swal.fire("Oops", "Password minimal 6 karakter", "warning");
          return;
        }

        const user = auth.currentUser;

        if (!user) {
          Swal.fire("Error", "User tidak ditemukan", "error");
          return;
        }

        btn.disabled = true;
        btn.innerText = "Memproses...";

        try {
          // 🔐 re-auth (verifikasi password lama)
          const credential = EmailAuthProvider.credential(
            user.email,
            oldPassword,
          );

          await reauthenticateWithCredential(user, credential);

          // 🔄 update password
          await updatePassword(user, newPassword);

          Swal.fire("Berhasil", "Password berhasil diubah", "success");

          // reset form
          document.getElementById("oldPassword").value = "";
          document.getElementById("newPassword").value = "";
          document.getElementById("confirmPassword").value = "";
        } catch (err) {
          console.log(err);

          if (err.code === "auth/invalid-credential") {
            Swal.fire("Error", "Password lama salah", "error");
          } else {
            Swal.fire("Error", "Gagal mengubah password", "error");
          }
        }

        btn.disabled = false;
        btn.innerText = "🔐 Ubah Password";
      });
    </script>
  </body>
</html>
