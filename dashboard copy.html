<!doctype html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NADI - Navigasi Administrasi Digital Internal</title>
    <link
      rel="shortcut icon"
      href="assets/img/nadiv2.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/css/newInterface.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">
        <img
          src="assets/img/nadiv2.png"
          alt="Logo Instansi"
          width="85"
          style="display: block; margin: 2 auto 20px"
        />
        <span
          >NADI - Navigasi Administrasi Digital Internal <br />KPU Kab.
          Purbalingga</span
        >
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
      <div class="page-title">
        <h2>
          <span id="greeting"
            >NADI - Navigasi Administrasi Digital Internal</span
          >, <span id="userInfo">Memuat data user...</span>
        </h2>
      </div>

      <div class="menu-container">
        <a href="absensi.html"
          ><button class="menu-btn">📝 Absen Online</button></a
        >
        <a href="pengambilanbarangpersediaan.html"
          ><button class="menu-btn">
            📝 Pengambilan Barang Persediaan / ATK
          </button></a
        >
        <a href="profile.html"
          ><button class="menu-btn">👨‍💼 Halaman Profil</button></a
        >
        <a href="admin.html"
          ><button id="btnAdmin" class="menu-btn">⚙️ Admin Panel</button></a
        >
        <button class="menu-btn" onclick="about()">ℹ️ Tentang</button>
        <button class="menu-btn" onclick="logout()">Logout &#8594;</button>
      </div>

      <div id="content"></div>
    </main>

    <footer>
      © <span id="year"></span> NADI - Navigasi Administrasi Digital Internal
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      function soon() {
        Swal.fire({
          icon: "warning",
          title: "Segera Hadir",
          text: "Fitur ini akan segera hadir",
        });
      }

      function about() {
        Swal.fire({
          icon: "info",
          title: "Tentang NADI",
          text: "Navigasi Administrasi Digital Internal (v.2.1) KPU Kab. Purbalingga adalah sistem layanan administrasi untuk internal pegawai KPU Kab. Purbalingga",
        });
      }

      // script waktu
      // Fungsi sapaan sesuai waktu
      function setGreeting() {
        const hour = new Date().getHours();
        let greeting = "Selamat datang";

        if (hour >= 5 && hour < 11) greeting = "Selamat pagi ☀️";
        else if (hour >= 11 && hour < 15) greeting = "Selamat siang 🌤️";
        else if (hour >= 15 && hour < 18) greeting = "Selamat sore 🌇";
        else greeting = "Selamat malam 🌙";

        document.getElementById("greeting").textContent = greeting;
      }

      // Fungsi update jam di kanan atas
      function updateClock() {
        const now = new Date();
        const jam = now.getHours().toString().padStart(2, "0");
        const menit = now.getMinutes().toString().padStart(2, "0");
        const detik = now.getSeconds().toString().padStart(2, "0");
        document.getElementById("clock").textContent =
          `${jam}:${menit}:${detik}`;
      }
      setGreeting();
      setInterval(updateClock, 1000);
      updateClock();
    </script>

    <!-- script firebase -->
    <script type="module" src="./assets/js/auth-guard.js"></script>
    <script type="module">
      import { auth, db } from "./assets/js/firebase.js";
      import {
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      import {
        collection,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      let currentUser = null;

      const btnAdmin = document.getElementById("btnAdmin");
      const userInfo = document.getElementById("userInfo");

      // default: sembunyikan admin button
      btnAdmin.style.display = "none";

      window.logout = async function () {
        await signOut(auth);
        window.location.replace("index.html");
      };

      function getToday() {
        return new Date().toISOString().split("T")[0];
      }

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "index.html";
          return;
        }

        try {
          const username = user.email.split("@")[0];

          const q = query(
            collection(db, "users"),
            where("username", "==", username),
          );

          const snapshot = await getDocs(q);

          if (snapshot.empty) {
            console.error("User tidak ditemukan di Firestore");
            return;
          }

          const userData = snapshot.docs[0].data();

          // simpan global
          currentUser = {
            username: userData.username,
            nama: userData.nama,
          };

          // tampilkan nama user
          userInfo.innerText = currentUser.nama;

          // tampilkan tombol admin kalau admin
          if (userData.role === "admin") {
            btnAdmin.style.display = "inline-block";
          }
        } catch (err) {
          console.error("Error load user:", err);
        }
      });
    </script>
  </body>
</html>
