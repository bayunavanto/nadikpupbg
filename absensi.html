<!doctype html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NADI - Navigasi Administrasi Digital Internal</title>
    <link
      rel="shortcut icon"
      href="assets/img/nadiv2.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/css/interface.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">
        <img
          src="assets/img/nadiv2.png"
          alt="Logo Instansi"
          width="85"
          style="display: block; margin: 2 auto 20px"
        />
        <span>
          NADI - Navigasi Administrasi Digital Internal <br />KPU Kab.
          Purbalingga
        </span>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
      <div class="page-title">
        <div class="status-card" id="absenStatus">Memuat status absensi...</div>
      </div>

      <div class="menu-container">
        <a href="absenmasuk.html" class="menu-btn primary">📝 Absen masuk</a>
        <a href="absenkeluar.html" class="menu-btn secondary"
          >📝 Absen keluar</a
        >
        <a href="dashboard.html" class="menu-btn danger">&larr; Kembali</a>
      </div>

      <div id="content"></div>
    </main>

    <footer>
      © <span id="year"></span> NADI - Navigasi Administrasi Digital Internal
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      // script waktu

      // Fungsi update jam di kanan atas
      function updateClock() {
        const now = new Date();
        const jam = now.getHours().toString().padStart(2, "0");
        const menit = now.getMinutes().toString().padStart(2, "0");
        const detik = now.getSeconds().toString().padStart(2, "0");
        document.getElementById("clock").textContent =
          `${jam}:${menit}:${detik}`;
      }
      setInterval(updateClock, 1000);
      updateClock();
    </script>

    <!-- script firebase -->
    <script type="module" src="./assets/js/auth-guard.js"></script>
    <script type="module">
      import {
        collection,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
      import { db } from "./assets/js/firebase.js";

      let currentUser = null;

      function getToday() {
        return new Date().toLocaleDateString("sv-SE", {
          timeZone: "Asia/Jakarta",
        });
      }

      function getNowMinutes() {
        const now = new Date();
        return now.getHours() * 60 + now.getMinutes();
      }

      async function loadStatusAbsensi() {
        const today = getToday();

        const q = query(
          collection(db, "absensi"),
          where("username", "==", currentUser.username),
          where("tanggal", "==", today),
        );

        const snapshot = await getDocs(q);

        let data = null;

        if (!snapshot.empty) {
          // ambil SEMUA lalu pilih yang paling aman (hindari random order)
          data = snapshot.docs.map((d) => d.data())[0];
        }

        const el = document.getElementById("absenStatus");

        if (!el) return;

        if (!data) {
          el.innerHTML = `
            <div class="title">Status Hari Ini</div>
            <div class="bad">❌ Belum absen hari ini</div>
          `;
        } else {
          el.innerHTML = `
            <div class="title">Status Hari Ini</div>
            <div class="ok">📌 Sudah absen</div>
            <div>Masuk: ${data.jamMasuk || "-"} (${data.statusMasuk || "-"})</div>
            <div>Keluar: ${data.jamKeluar || "-"} (${data.statusKeluar || "-"})</div>
          `;
        }
      }

      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import { auth } from "./assets/js/firebase.js";

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "index.html";
          return;
        }

        currentUser = {
          username: user.email.split("@")[0],
          nama: user.email.split("@")[0],
        };

        await loadStatusAbsensi();
      });
    </script>
  </body>
</html>
