<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NADI - Formulir Absen Online KPU Kab. Purbalingga</title>
    <link rel="icon" href="assets/img/nadiv2.png" type="image/png" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/simple-line-icons/2.4.1/css/simple-line-icons.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./assets/css/absen.css" />
  </head>
  <body>
    <div class="absen-page">
      <div class="absen-card">
        <a href="absensi.html" class="back-link">&larr; Kembali</a>

        <div class="header-box">
          <img src="assets/img/nadiv2.png" width="90" />
          <h2>Absen Masuk</h2>
          <p>Pastikan GPS aktif dan foto jelas</p>
        </div>

        <form id="frm" autocomplete="off">
          <div class="form-group">
            <label>Nama Pegawai</label>
            <input type="text" id="nama" readonly class="input-box" />
          </div>

          <div class="form-group">
            <label>Ambil Foto</label>
            <input
              type="file"
              id="foto"
              accept="image/*"
              capture="camera"
              class="input-box"
            />
          </div>

          <div class="preview-box" id="previewBox" style="display: none">
            <img
              id="previewImg"
              style="width: 100%; border-radius: 12px margin"
            />
            <small>Preview foto absensi</small>
          </div>

          <div id="statusBox" class="status-box">Siap melakukan absensi</div>

          <button type="submit" id="btnKirim" class="btn-primary">
            🚀 Rekam Absen Masuk
          </button>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      const fotoInput = document.getElementById("foto");
      const previewBox = document.getElementById("previewBox");
      const previewImg = document.getElementById("previewImg");

      fotoInput.addEventListener("change", function () {
        const file = this.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function (e) {
          previewImg.src = e.target.result;
          previewBox.style.display = "block";
        };

        reader.readAsDataURL(file);
      });
    </script>

    <script type="module">
      import { db, storage } from "./assets/js/firebase.js";

      import {
        collection,
        addDoc,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      import {
        ref,
        uploadString,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

      /* =========================
        AUTO USER
      ========================= */
      const interval = setInterval(() => {
        if (window.currentUser) {
          document.getElementById("nama").value = currentUser.nama;
          clearInterval(interval);
        }
      }, 100);

      /* =========================
        COMPRESS IMAGE
        ========================= */
      function compressImage(file, maxWidth = 800, quality = 0.6) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);

          reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;

            img.onload = () => {
              const canvas = document.createElement("canvas");
              const ctx = canvas.getContext("2d");

              const scale = maxWidth / img.width;

              canvas.width = maxWidth;
              canvas.height = img.height * scale;

              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

              resolve(canvas.toDataURL("image/jpeg", quality));
            };
          };

          reader.onerror = reject;
        });
      }

      // set selalu waktu wib
      function getNowWIB() {
        return new Date(
          new Date().toLocaleString("en-US", {
            timeZone: "Asia/Jakarta",
          }),
        );
      }

      /* =========================
        HITUNG TELAT
        ========================= */
      function hitungTelatMenit(now) {
        const jam = now.getHours();
        const menit = now.getMinutes();

        const total = jam * 60 + menit;

        const batasTepat = 7 * 60 + 30; // 07:30
        const batasTelatAkhir = 8 * 60 + 29; // 08:29

        if (total <= batasTepat) {
          return 0; // tepat waktu
        }

        if (total <= batasTelatAkhir) {
          return total - batasTepat;
        }

        return null; // tidak valid
      }

      /* =========================
        MAIN ABSEN MASUK
        ========================= */
      const btn = document.getElementById("btnKirim");
      const form = document.getElementById("frm");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        absenMasuk();
      });

      async function absenMasuk() {
        btn.disabled = true;

        function setStatus(text, type = "loading") {
          const el = document.getElementById("statusBox");
          if (!el) return;

          el.className = "status-box " + type;
          el.innerText = text;
        }

        /* =========================
          GPS SUPPORT CHECK
        ========================= */
        if (!navigator.geolocation) {
          Swal.fire("Error", "Browser tidak support GPS", "error");
          btn.disabled = false;
          return;
        }

        let gpsDone = false;
        let gpsStep = 0;

        const gpsMessages = [
          "📡 Mengaktifkan GPS...",
          "📶 Mencari sinyal satelit...",
          "📍 Menentukan lokasi...",
          "⏳ Sedikit lagi...",
        ];

        const gpsInterval = setInterval(() => {
          if (gpsStep >= gpsMessages.length) gpsStep = 0;

          setStatus(gpsMessages[gpsStep], "loading");
          gpsStep++;
        }, 2000);

        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            gpsDone = true;
            clearInterval(gpsInterval);
            // updateLoading("📍 Lokasi ditemukan...");
            // setStep("📍 Lokasi ditemukan...", 40);
            setStatus("📍 Lokasi ditemukan", "loading");

            try {
              if (!currentUser || !currentUser.nama || !currentUser.username) {
                Swal.fire({
                  icon: "error",
                  title: "User belum siap",
                  text: "Data user belum termuat, mohon tunggu sebentar lalu coba lagi",
                });

                btn.disabled = false;
                return;
              }
              const nama = currentUser.nama;
              const username = currentUser.username;
              const file = document.getElementById("foto").files[0];

              if (!file) {
                Swal.fire("Error", "Foto wajib diisi", "error");
                btn.disabled = false;
                return;
              }

              const now = getNowWIB();
              const jam = now.toTimeString().split(" ")[0];
              const tanggal = new Date().toLocaleDateString("sv-SE", {
                timeZone: "Asia/Jakarta",
              });

              // cek data absensi hari ini
              const q = query(
                collection(db, "absensi"),
                where("username", "==", currentUser.username),
                where("tanggal", "==", tanggal),
              );

              const snap = await getDocs(q);

              if (!snap.empty) {
                Swal.fire({
                  icon: "warning",
                  title: "Absen Ditolak",
                  text: "Kamu sudah melakukan absen masuk hari ini",
                });

                btn.disabled = false;
                return;
              }

              // cek jika absen melebihi jam 08:30
              const batasAbsen = 8 * 60 + 30; // 08:30
              const totalMenit = now.getHours() * 60 + now.getMinutes();

              if (totalMenit > batasAbsen) {
                Swal.fire({
                  icon: "error",
                  title: "Absen Ditolak",
                  text: "Sudah melewati batas toleransi absen (08:30)",
                });

                btn.disabled = false;
                return;
              }

              /* =========================
                TELAT LOGIC
                ========================= */
              const telatMenit = hitungTelatMenit(now);

              let statusMasuk = "tepat waktu";

              if (telatMenit === null) {
                statusMasuk = "tidak valid";
              } else if (telatMenit > 0) {
                statusMasuk = "telat";
              }

              // setStep("📷 Mengompres foto...", 60);
              setStatus("📷 Mengompres foto...", "loading");

              const fotoBase64 = await compressImage(file);

              const safeNama = currentUser.nama.replace(/[^\w\s]/gi, "");
              const fileName = `absensi/masuk_${jam}_${tanggal}_${safeNama}.jpg`;

              const storageRef = ref(storage, fileName);

              await uploadString(storageRef, fotoBase64, "data_url");
              const fotoURL = await getDownloadURL(storageRef);
              // setStep("📡 Mengirim data absensi...", 90);
              setStatus("📡 Mengirim data absensi...", "loading");

              /* =========================
                SAVE FIRESTORE
                ========================= */
              await addDoc(collection(db, "absensi"), {
                username: currentUser.username,
                nama: currentUser.nama,
                uid: currentUser.uid,
                tanggal,
                jamMasuk: jam,
                statusMasuk,
                telatMenit,
                latitudeMasuk: pos.coords.latitude,
                longitudeMasuk: pos.coords.longitude,
                fotoMasuk: fotoURL,
                createdAt: new Date(),
              });

              // form.reset();
              // btn.disabled = false;

              Swal.fire({
                icon: "success",
                title: "Absen Masuk Tercatat",
                text: "Terima kasih sudah melakukan absensi",
                confirmButtonText: "Kembali",
              }).then(() => {
                window.location.href = "absensi.html";
              });
            } catch (err) {
              console.error(err);
              Swal.fire("Error", err.message, "error");
              btn.disabled = false;
            }
          },

          (err) => {
            gpsDone = true;
            clearInterval(gpsInterval);

            let msg = "Gagal ambil lokasi";

            if (err.code === 1) msg = "Izin lokasi ditolak";
            if (err.code === 2) msg = "Lokasi tidak tersedia";
            if (err.code === 3) msg = "GPS timeout";

            Swal.fire("Error", msg, "error");
            btn.disabled = false;
          },

          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0,
          },
        );
      }

      /* =========================
        STEP UI
      ========================= */
      function setStep(text, progress) {
        const el = document.getElementById("status-text");
        const bar = document.getElementById("progress-bar");

        if (!el) return;

        el.classList.add("fade-out");

        setTimeout(() => {
          el.innerHTML = text;
          el.classList.remove("fade-out");
        }, 200);

        if (bar) bar.style.width = progress + "%";

        Swal.showLoading();
      }
    </script>

    <!-- script firebase -->
    <script type="module" src="./assets/js/auth-guard.js"></script>
  </body>
</html>
